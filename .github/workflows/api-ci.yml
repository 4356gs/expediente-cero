name: API CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  api-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install API and development dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run API quality gate
        run: make check

